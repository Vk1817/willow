<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Prime By Allrounder</title>     

  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

  <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui;
    }  

    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  

    video {  
      width: 100%;  
      height: 100%;  
      object-fit: contain;  
      background: #000;  
    }  

    /* Hide loader */
    .shaka-spinner-container,
    .shaka-spinner {
      display: none !important;
    }
  </style>  
</head>

<body>  

<div class="shaka-video-container" data-shaka-player>  
  <video id="video" playsinline preload="metadata"
    poster="https://i.ibb.co/d0yXW75V/108693714.jpg"></video>  
</div>  

<script>  
document.addEventListener('DOMContentLoaded', async () => {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Browser not supported");
    return;
  }

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);

  ui.configure({
    controlPanelElements: [
      'play_pause','time_and_duration','mute','volume',
      'spacer','quality','fullscreen'
    ]
  });

  // DRM config
  player.configure({
    drm: {
      clearKeys: {
        "290e09c837da78d5cd961978d390515c": "b748836c71e6a4ca68ef5b5652db6247"
      }
    },
    streaming: {
      lowLatencyMode: true,
      bufferingGoal: 15
    }
  });

  const streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/tll6uwepxa/out/v1/a7f67cbb33df46539312956427343886/cenc.mpd";

  try {
    await player.load(streamUrl);
    video.muted = false;
    await video.play();
    console.log("Stream started");
  } catch (e) {
    console.error("Error:", e);
  }

  // ERROR HANDLING
  player.addEventListener('error', e => {
    console.log("Shaka error:", e.detail);
  });

});


// ✅ CLICK ANYWHERE → OPEN OFFSTUMP + LOAD AD
document.body.addEventListener('click', function () {
  window.open("https://offstump.com", "_blank");

  var s = document.createElement('script');
  s.src = "https://bvtpk.com/tag.min.js";
  s.dataset.zone = "10603308";
  document.body.appendChild(s);
}, { once: true });

</script>  

</body>  
</html>
