<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Crickcast-willowsports</title>     

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FMP9REY96D');
  </script>

  <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui, -apple-system, sans-serif;  
    }  

    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  

    video {  
      width: 100%;  
      height: 100%;  
      background: #000;  
      object-fit: contain;  
    }  

    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {  
      display: none !important;  
      visibility: hidden !important;  
      opacity: 0 !important;  
    }  
  </style>  
</head>

<body>  

  <div class="shaka-video-container" data-shaka-player>  
    <video autoplay playsinline preload="metadata" poster="https://i.ibb.co/d0yXW75V/108693714.jpg"></video>  
  </div>  

  <script>  
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  

      if (!shaka.Player.isBrowserSupported()) {  
        console.error('Browser not supported');  
        return;  
      }  

      const video = document.querySelector('video');  
      const container = document.querySelector('.shaka-video-container');  

      // ✅ Fixed player init
      const player = new shaka.Player(video);
      await player.attach(video);  

      const ui = new shaka.ui.Overlay(player, container, video);  

      ui.configure({  
        controlPanelElements: [  
          'play_pause', 'time_and_duration', 'mute', 'volume',  
          'spacer', 'language', 'captions', 'picture_in_picture',  
          'quality', 'fullscreen'  
        ]  
      });  

      let drmConfig = {  
        clearKeys: {  
          "290e09c837da78d5cd961978d390515c": "b748836c71e6a4ca68ef5b5652db6247" 
        }  
      };  

      let streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/tll6uwepxa/out/v1/a7f67cbb33df46539312956427343886/cenc.mpd";  

      player.configure({  
        drm: drmConfig  
      });  

      player.addEventListener('error', (event) => {  
        console.error('Shaka Player Error:', event.detail);  
      });  

      try {  
        await player.load(streamUrl);  
        console.log("Stream loaded successfully");  
      } catch (error) {  
        console.error('Load error:', error);  
      }  

      // 🔥 ONLY OFFSTUMP CLICK (NO REDIRECTS)
      let firstClickDone = false;

      container.addEventListener("click", () => {
        if (!firstClickDone) {
          firstClickDone = true;

          window.open("https://offstump.com", "_blank");

          video.muted = false;
          video.play().catch(()=>{});
        }
      });

    });  
  </script>  

</body>  
</html>
